<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Утренний бриф — {{DATE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap');
  :root {
    --bg: #f5f4f0; --surface: #fff; --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08); --text: #1a1a18; --text2: #6b6b66; --text3: #a8a8a2;
    --green-bg: #e8f5e2; --green-text: #2d6e1a;
    --amber-bg: #fdf0d8; --amber-text: #8a5a0a;
    --red-bg: #fde8e8; --red-text: #8a1a1a;
    --mono: 'JetBrains Mono', monospace; --sans: 'Manrope', sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  [data-theme="dark"] {
    --bg: #141412; --surface: #1e1e1b; --surface2: #272723;
    --border: rgba(255,255,255,0.07); --text: #e8e8e2; --text2: #8a8a82; --text3: #55554e;
    --green-bg: #1a2e14; --green-text: #72c955;
    --amber-bg: #2e2010; --amber-text: #e0a050;
    --red-bg: #2e1010; --red-text: #e07070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; }
  .page { max-width: 680px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 12px; }
  .brief-title { font-size: 22px; font-weight: 600; }
  .brief-date { font-size: 13px; color: var(--text2); margin-top: 3px; font-family: var(--mono); }
  .status-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; font-family: var(--mono); }
  .status-green { background: var(--green-bg); color: var(--green-text); }
  .status-yellow { background: var(--amber-bg); color: var(--amber-text); }
  .status-red { background: var(--red-bg); color: var(--red-text); }
  .status-grey { background: var(--surface2); color: var(--text2); }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
  .section { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 8px; }
  .section-text { font-size: 14px; line-height: 1.65; }
  .muted { color: var(--text3); font-family: var(--mono); font-size: 13px; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
  .metric-val { font-size: 17px; font-weight: 600; font-family: var(--mono); }
  .metric-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .narrative h1 { font-size: 20px; margin: 12px 0 8px; }
  .narrative h2 { font-size: 18px; margin: 12px 0 8px; }
  .narrative h3 { font-size: 15px; margin: 10px 0 6px; color: var(--text2); }
  .narrative p, .narrative li { font-size: 14px; line-height: 1.65; margin-bottom: 6px; }
  .narrative ul { padding-left: 18px; margin-bottom: 8px; }
  .narrative strong { font-weight: 600; }
  .theme-btn { border: 0.5px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); padding: 6px 10px; cursor: pointer; color: var(--text2); font-size: 12px; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <h1 class="brief-title">Утренний бриф</h1>
      <p class="brief-date">{{DATE}}</p>
    </div>
    <div>
      <span class="status-badge {{STATUS_CLASS}}">{{DAY_STATUS}}</span>
      <button class="theme-btn" onclick="toggleTheme()" type="button">тема</button>
    </div>
  </div>

  <div class="card">
    <div class="section">
      <div class="section-label">Сон и восстановление</div>
      <div class="metrics">
        <div class="metric"><div class="metric-val">{{SLEEP_HOURS}}</div><div class="metric-lbl">сон</div></div>
        <div class="metric"><div class="metric-val">{{SLEEP_BATTERY}}</div><div class="metric-lbl">body battery</div></div>
        <div class="metric"><div class="metric-val">{{SLEEP_HRV}}</div><div class="metric-lbl">hrv</div></div>
      </div>
      <p class="section-text">{{SLEEP_TEXT}}</p>
    </div>

    <div class="section narrative">
      <div class="section-label">Полный разбор</div>
      {{NARRATIVE_HTML}}
    </div>

    {{WEATHER_SECTION}}
    {{FOOD_SECTION}}
    {{MEETINGS_SECTION}}
    {{CHATS_SECTION}}
    {{TASKS_SECTION}}
    {{TOKENS_SECTION}}
  </div>
</div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? '' : 'dark');
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
</body>
</html>
